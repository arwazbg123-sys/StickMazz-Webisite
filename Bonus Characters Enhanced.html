<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚂 StickMazz - Bonus Lokomotif (Enhanced)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0a1a 0%, #1a0a2e 50%, #16213e 100%);
            color: #e0e0e0;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        /* Background particles effect */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(2px 2px at 20% 30%, #eee, rgba(0,0,0,0)),
                        radial-gradient(2px 2px at 60% 70%, #fff, rgba(0,0,0,0)),
                        radial-gradient(1px 1px at 50% 50%, #ddd, rgba(0,0,0,0)),
                        radial-gradient(1px 1px at 80% 10%, #fff, rgba(0,0,0,0)),
                        radial-gradient(2px 2px at 90% 60%, #eee, rgba(0,0,0,0)),
                        radial-gradient(1px 1px at 30% 80%, #fff, rgba(0,0,0,0));
            background-size: 500% 500%, 350% 350%, 250% 250%, 200% 200%, 150% 150%, 100% 100%;
            background-position: 0% 0%, 40% 60%, 130% 270%, 70% 100%, 150% 140%, 90% 10%;
            background-repeat: repeat;
            pointer-events: none;
            z-index: 1;
            opacity: 0.03;
            animation: shift 20s infinite linear;
        }

        @keyframes shift {
            0% { background-position: 0% 0%, 40% 60%, 130% 270%, 70% 100%, 150% 140%, 90% 10%; }
            100% { background-position: 100% 100%, 140% 160%, 230% 370%, 170% 200%, 250% 240%, 190% 110%; }
        }

        header {
            position: relative;
            z-index: 10;
            background: linear-gradient(90deg, #00d4ff 0%, #a855f7 50%, #ff006e 100%);
            background-size: 300% 300%;
            animation: gradientShift 8s ease infinite;
            padding: 30px 20px;
            text-align: center;
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.4), inset 0 0 20px rgba(255, 255, 255, 0.1);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        header h1 {
            font-size: 2.8rem;
            color: #fff;
            text-shadow: 0 0 20px rgba(0, 0, 0, 0.5), 0 0 10px rgba(0, 212, 255, 0.3);
            margin-bottom: 5px;
            letter-spacing: 2px;
            font-weight: 800;
        }

        header p {
            font-size: 1.1rem;
            color: rgba(255, 255, 255, 0.95);
            font-style: italic;
            text-shadow: 0 0 10px rgba(0, 0, 0, 0.3);
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 40px 20px;
            position: relative;
            z-index: 2;
        }

        .section-header {
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 2px solid rgba(0, 212, 255, 0.3);
        }

        .section-title {
            font-size: 2.2rem;
            color: #00d4ff;
            margin-bottom: 10px;
            text-shadow: 0 0 15px rgba(0, 212, 255, 0.4);
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .section-title::before {
            content: '';
            display: inline-block;
            width: 30px;
            height: 30px;
            background: linear-gradient(135deg, #a855f7, #ff006e);
            border-radius: 50%;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        .section-subtitle {
            font-size: 0.95rem;
            color: #a0a0a0;
            margin-bottom: 10px;
        }

        /* Search & Filter Section */
        .search-section {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            align-items: center;
        }

        .search-box {
            flex: 1;
            min-width: 250px;
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 12px 18px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(0, 212, 255, 0.3);
            border-radius: 25px;
            color: #fff;
            font-size: 0.95rem;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .search-box input:focus {
            outline: none;
            border-color: #00d4ff;
            background: rgba(0, 212, 255, 0.1);
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
        }

        .search-box input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .filter-chips {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 8px 16px;
            background: rgba(168, 85, 247, 0.2);
            border: 1px solid rgba(168, 85, 247, 0.5);
            border-radius: 20px;
            color: #a0a0a0;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .filter-btn:hover,
        .filter-btn.active {
            background: linear-gradient(135deg, #a855f7, #ff006e);
            border-color: #ff006e;
            color: #fff;
            transform: scale(1.05);
        }

        /* Grid Layout */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
            margin-bottom: 50px;
        }

        /* Character Card - PREMIUM DESIGN */
        .char-card {
            position: relative;
            height: 100%;
            cursor: pointer;
            perspective: 1000px;
        }

        .card-inner {
            background: linear-gradient(135deg, rgba(20, 20, 40, 0.9), rgba(40, 20, 60, 0.7));
            border: 1px solid rgba(0, 212, 255, 0.2);
            border-radius: 16px;
            padding: 0;
            backdrop-filter: blur(15px);
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            display: flex;
            flex-direction: column;
            height: 100%;
            overflow: hidden;
            position: relative;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        /* Animated gradient background */
        .card-inner::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(45deg, 
                transparent 0%, 
                rgba(0, 212, 255, 0.1) 50%, 
                transparent 100%);
            background-size: 200% 200%;
            animation: gradientFlow 6s ease infinite;
            pointer-events: none;
            z-index: 1;
        }

        @keyframes gradientFlow {
            0% { background-position: 0% 0%; }
            50% { background-position: 100% 100%; }
            100% { background-position: 0% 0%; }
        }

        .char-card:hover .card-inner {
            transform: translateY(-12px) scale(1.02);
            border-color: rgba(0, 212, 255, 0.6);
            box-shadow: 0 16px 48px rgba(0, 212, 255, 0.3), inset 0 0 20px rgba(0, 212, 255, 0.1);
        }

        .card-header {
            padding: 20px;
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.15), rgba(168, 85, 247, 0.1));
            border-bottom: 1px solid rgba(0, 212, 255, 0.1);
            position: relative;
            z-index: 2;
        }

        .char-name {
            font-size: 1.35rem;
            font-weight: 800;
            color: #fff;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }

        .char-code {
            font-size: 0.75rem;
            color: #00d4ff;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .card-body {
            padding: 20px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            z-index: 2;
        }

        .info-item {
            margin-bottom: 12px;
            font-size: 0.9rem;
        }

        .info-label {
            color: #a0a0a0;
            font-weight: 600;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .info-value {
            color: #fff;
            margin-top: 3px;
            font-size: 0.95rem;
        }

        .vibe-tag {
            display: inline-block;
            background: linear-gradient(135deg, #a855f7, #ff006e);
            color: #fff;
            padding: 6px 12px;
            border-radius: 15px;
            font-size: 0.8rem;
            font-weight: 600;
            margin-bottom: 12px;
        }

        .zone-tag {
            display: inline-block;
            background: rgba(0, 212, 255, 0.15);
            color: #00d4ff;
            padding: 6px 12px;
            border-radius: 15px;
            font-size: 0.8rem;
            font-weight: 600;
            border: 1px solid rgba(0, 212, 255, 0.3);
        }

        .card-footer {
            padding: 15px 20px;
            border-top: 1px solid rgba(0, 212, 255, 0.1);
            background: rgba(0, 0, 0, 0.2);
            position: relative;
            z-index: 2;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Status Indicators */
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            backdrop-filter: blur(10px);
        }

        .status-active {
            background: linear-gradient(135deg, #00d4ff, #4dd9ff);
            color: #000;
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.4);
            animation: pulse-glow 2s ease-in-out infinite;
        }

        .status-inactive {
            background: linear-gradient(135deg, #64b5f6, #42a5f5);
            color: #fff;
            box-shadow: 0 0 15px rgba(100, 181, 246, 0.3);
            animation: freeze-pulse 3s ease-in-out infinite;
        }

        .status-suspended {
            background: linear-gradient(135deg, #ff6b9d, #ff5985);
            color: #fff;
            box-shadow: 0 0 15px rgba(255, 107, 157, 0.4);
            animation: danger-pulse 0.6s ease-in-out infinite;
        }

        .status-missing {
            background: linear-gradient(135deg, #ba68c8, #ab47bc);
            color: #fff;
            box-shadow: 0 0 15px rgba(168, 85, 247, 0.3);
            animation: fade-pulse 4s ease-in-out infinite;
        }

        .status-planning {
            background: linear-gradient(135deg, #ffd54f, #ffb74d);
            color: #000;
            box-shadow: 0 0 15px rgba(255, 213, 79, 0.3);
            animation: shimmer 2s ease-in-out infinite;
        }

        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 15px rgba(0, 212, 255, 0.4); }
            50% { box-shadow: 0 0 25px rgba(0, 212, 255, 0.7); }
        }

        @keyframes freeze-pulse {
            0%, 100% { opacity: 0.8; }
            50% { opacity: 0.6; }
        }

        @keyframes danger-pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        @keyframes fade-pulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 0.3; }
        }

        @keyframes shimmer {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(0, 0, 0, 0.7), rgba(40, 20, 60, 0.5));
            backdrop-filter: blur(8px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
            animation: fadeIn 0.3s ease;
        }

        .modal.show {
            display: flex;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-content {
            background: linear-gradient(135deg, #0a0a1a 0%, #1a0a2e 100%);
            border: 1px solid rgba(0, 212, 255, 0.3);
            border-radius: 20px;
            padding: 40px;
            max-width: 800px;
            width: 100%;
            max-height: 85vh;
            overflow-y: auto;
            box-shadow: 0 0 60px rgba(0, 212, 255, 0.4), inset 0 0 30px rgba(0, 212, 255, 0.1);
            animation: slideUp 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
            z-index: 1001;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .modal-close {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 107, 157, 0.2);
            border: none;
            color: #ff6b9d;
            font-size: 28px;
            cursor: pointer;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .modal-close:hover {
            background: rgba(255, 107, 157, 0.4);
            transform: scale(1.2) rotate(90deg);
        }

        .modal-header {
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid rgba(0, 212, 255, 0.3);
        }

        .modal-title {
            font-size: 2rem;
            color: #00d4ff;
            text-shadow: 0 0 15px rgba(0, 212, 255, 0.3);
            margin-bottom: 10px;
        }

        .modal-meta {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-top: 15px;
        }

        .modal-body {
            color: #e0e0e0;
            line-height: 1.7;
        }

        .modal-body p {
            margin-bottom: 18px;
            text-align: justify;
        }

        .modal-body strong {
            color: #00d4ff;
        }

        /* Responsive */
        @media (max-width: 768px) {
            header h1 {
                font-size: 1.8rem;
            }

            .grid-container {
                grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
                gap: 15px;
            }

            .modal-content {
                padding: 30px 20px;
                margin: 20px;
            }

            .section-title {
                font-size: 1.6rem;
            }
        }

        footer {
            text-align: center;
            padding: 20px;
            color: #666;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            position: relative;
            z-index: 2;
        }
    </style>
</head>
<body>
    <header>
        <h1>🚂 BONUS LOKOMOTIF</h1>
        <p>✨ Karakter Lokomotif Unik dari Dunia Nesyabella ✨</p>
    </header>

    <div class="container">
        <div class="section-header">
            <div class="section-title">🔥 Karakter Bonus Aktif</div>
            <p class="section-subtitle">37+ lokomotif dengan cerita unik dan kepribadian yang menarik</p>
        </div>

        <div class="search-section">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="🔍 Cari nama, kode, atau zona lokomotif...">
            </div>
            <div class="filter-chips">
                <button class="filter-btn active" data-status="all">Semua</button>
                <button class="filter-btn" data-status="active">Aktif</button>
                <button class="filter-btn" data-status="inactive">Freeze</button>
                <button class="filter-btn" data-status="suspended">Penjara</button>
                <button class="filter-btn" data-status="missing">Hilang</button>
            </div>
        </div>

        <div class="grid-container" id="charactersGrid"></div>
    </div>

    <!-- Modal -->
    <div class="modal" id="detailModal">
        <div class="modal-content">
            <button class="modal-close" onclick="closeModal()">✕</button>
            <div class="modal-header">
                <h2 class="modal-title" id="modalName"></h2>
                <div class="modal-meta" id="modalMeta"></div>
            </div>
            <div class="modal-body" id="modalBody"></div>
        </div>
    </div>

    <footer>
        🌍 StickMazz | Nesyabella Universe | Bonus Lokomotif Edition
    </footer>

    <script>
        // Character data dari bonus-characters.js
        let allCharacters = [];
        let filteredCharacters = [];
        let currentFilter = 'all';
        let currentSearch = '';

        // Load characters (placeholder - akan diisi dari bonus-characters.js)
        async function loadCharacters() {
            // Assume bonusCharactersDatabase tersedia dari bonus-characters.js
            if (typeof bonusCharactersDatabase !== 'undefined') {
                allCharacters = bonusCharactersDatabase;
                filterCharacters();
                renderGrid();
            }
        }

        function filterCharacters() {
            filteredCharacters = allCharacters.filter(char => {
                const matchFilter = currentFilter === 'all' || char.status === currentFilter;
                const matchSearch = currentSearch === '' || 
                    char.name.toLowerCase().includes(currentSearch.toLowerCase()) ||
                    char.code.toLowerCase().includes(currentSearch.toLowerCase()) ||
                    char.zone.toLowerCase().includes(currentSearch.toLowerCase()) ||
                    char.vibe.toLowerCase().includes(currentSearch.toLowerCase());
                return matchFilter && matchSearch;
            });
        }

        function renderGrid() {
            const grid = document.getElementById('charactersGrid');
            grid.innerHTML = filteredCharacters.map(char => `
                <div class="char-card" onclick="openModal('${char.id}')">
                    <div class="card-inner">
                        <div class="card-header">
                            <div class="char-name">${char.name}</div>
                            <div class="char-code">${char.code}</div>
                        </div>
                        <div class="card-body">
                            <div class="vibe-tag">${char.vibe}</div>
                            <div class="info-item">
                                <div class="info-label">Race</div>
                                <div class="info-value" style="color: ${char.color}">${char.race || 'Lokomotif'}</div>
                            </div>
                            <div class="info-item">
                                <div class="info-label">Zona</div>
                                <div class="zone-tag">${char.zone}</div>
                            </div>
                            <div class="info-item" style="margin-top: auto;">
                                <div class="info-value" style="font-size: 0.85rem; color: #a0a0a0; line-height: 1.4;">
                                    ${char.story.substring(0, 80)}...
                                </div>
                            </div>
                        </div>
                        <div class="card-footer">
                            <span class="status-badge status-${char.status}">
                                ${char.status === 'active' ? '✨ AKTIF' : 
                                  char.status === 'inactive' ? '❄️ FREEZE' :
                                  char.status === 'suspended' ? '🔒 PENJARA' :
                                  char.status === 'missing' ? '👻 HILANG' : '📋 PLANNING'}
                            </span>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function openModal(id) {
            const char = allCharacters.find(c => c.id === id);
            if (!char) return;

            document.getElementById('modalName').textContent = char.name;
            document.getElementById('modalMeta').innerHTML = `
                <span class="status-badge status-${char.status}">
                    ${char.status.toUpperCase()}
                </span>
                <span class="zone-tag">${char.code}</span>
                <span class="zone-tag" style="background: rgba(168,85,247,0.15); border-color: rgba(168,85,247,0.3); color: #ba68c8;">${char.zone}</span>
            `;
            document.getElementById('modalBody').innerHTML = `
                <p><strong>Vibe:</strong> ${char.vibe}</p>
                <p><strong>Zona:</strong> ${char.zone}</p>
                <p><strong>Status:</strong> ${char.status}</p>
                <hr style="border: none; border-top: 1px solid rgba(0,212,255,0.2); margin: 20px 0;">
                <p>${char.story}</p>
            `;
            document.getElementById('detailModal').classList.add('show');
        }

        function closeModal() {
            document.getElementById('detailModal').classList.remove('show');
        }

        // Event listeners
        document.getElementById('searchInput')?.addEventListener('input', (e) => {
            currentSearch = e.target.value;
            filterCharacters();
            renderGrid();
        });

        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentFilter = this.dataset.status;
                filterCharacters();
                renderGrid();
            });
        });

        document.getElementById('detailModal')?.addEventListener('click', (e) => {
            if (e.target.id === 'detailModal') closeModal();
        });

        // Initialize
        window.addEventListener('load', loadCharacters);
    </script>
    <script src="bonus-characters.js"></script>
</body>
</html>
